version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: jalrakshak
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend-core
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis

  worker:
    build: ./backend-core
    command: celery -A celery_worker worker --loglevel=info
    depends_on:
      - redis
      - db

  ai-serving:
    build: ./ai-pipeline
    ports:
      - "8001:8000"
    depends_on:
      - db

volumes:
  postgres_data:
